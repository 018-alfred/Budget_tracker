<!DOCTYPE html>
<html>
<head>
    <title>Quick Budget</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Quick Budget</h1>

<input type="number" placeholder="Enter Amount">

<button>Set Amount</button>

<div class="cards">
    <div class="card">Initial Amount</div>
    <div class="card">Remaining</div>
    <div class="card">Total Spent</div>
</div>

<div class="progress">
    <div class="progress-fill"></div>
</div>

<input type="text" placeholder="Purchase Label">
<input type="number" placeholder="Amount">

<button>Add Purchase</button>

<button class="reset-btn">Reset</button>

</body>
</html>
