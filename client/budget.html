<!DOCTYPE html>
<html>
<head>
    <title>Budget Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Budget Tracker</h1>

<select>
    <option>Monthly Budget</option>
    <option>Annual Budget</option>
</select>

<input type="number" placeholder="Enter Budget Amount">

<button>Set Budget</button>

<div class="cards">
    <div class="card">Total Budget</div>
    <div class="card">Amount Spent</div>
    <div class="card">Remaining</div>
    <div class="card">Expense Count</div>
</div>

<input type="text" placeholder="Expense Label">
<input type="number" placeholder="Amount">
<button>Add Expense</button>

<table>
    <tr>
        <th>#</th>
        <th>Label</th>
        <th>Amount</th>
        <th>%</th>
    </tr>
</table>

</body>
</html>
